<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Hivoraa — Sign In</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&display=swap" rel="stylesheet">

 
</head>
<body>

  <div class="auth-container">

    <!-- Logo -->
    <div class="auth-logo">
      <img id="logo-img" src="assets/hivoraa-logo.webp" alt="Hivoraa Logo">
      <span class="auth-logo-text">Hivoraa</span>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <h1 class="auth-title">Welcome to Hivoraa</h1>
      <p class="auth-subtitle">Sign in or create your account instantly</p>

      <!-- Info -->
      <div class="info-text">
        Don't have an account? No worries —<br>your account is created automatically on first sign in.
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">continue with</span>
        <span class="divider-line"></span>
      </div>

      <!-- Google Button -->
      <button class="google-btn" id="google-login-btn">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <!-- Status -->
      <div class="status-message" id="status-message"></div>

      <p class="auth-footer">
        By continuing, you agree to our<br>
        <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
      </p>
    </div>

    <!-- Back -->
    <div style="text-align: center;">
      <a href="/" class="back-link">← Back to Knowledge Square</a>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/auth-test/index.js"></script>
</body>
</html>
