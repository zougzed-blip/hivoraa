<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Hivoraa — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a1f;
      --card-bg: #1f1f24;
      --card-hover: #26262c;
      --border: #2a2a30;
      --border-light: #33333a;
      --text-primary: #c8c8cd;
      --text-secondary: #888894;
      --text-muted: #5c5c66;
      --radius: 12px;
      --radius-lg: 16px;
      --transition: 150ms ease;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .auth-logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
    }

    .auth-logo-text {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.4px;
    }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
    }

    .auth-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
    }

    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
      background: var(--card-hover);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font);
      margin-bottom: 20px;
    }

    .google-btn:hover {
      border-color: var(--text-muted);
      background: var(--border);
    }

    .google-btn:active {
      transform: scale(0.98);
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .info-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
      background: rgba(160,160,170,0.05);
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .auth-footer {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .auth-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition);
    }

    .auth-footer a:hover {
      color: var(--text-primary);
    }

    .status-message {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      display: none;
    }

    .status-message.loading {
      display: block;
      background: rgba(160,160,170,0.08);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .status-message.success {
      display: block;
      background: rgba(74,158,107,0.1);
      color: #4a9e6b;
      border: 1px solid rgba(74,158,107,0.2);
    }

    .status-message.error {
      display: block;
      background: rgba(184,92,92,0.1);
      color: #b85c5c;
      border: 1px solid rgba(184,92,92,0.2);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--text-secondary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="auth-container">

    <!-- Logo -->
    <div class="auth-logo">
      <img id="logo-img" src="assets/hivoraa-logo.webp" alt="Hivoraa Logo">
      <span class="auth-logo-text">Hivoraa</span>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <h1 class="auth-title">Welcome to Hivoraa</h1>
      <p class="auth-subtitle">Sign in or create your account instantly</p>

      <!-- Info -->
      <div class="info-text">
        Don't have an account? No worries —<br>your account is created automatically on first sign in.
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">continue with</span>
        <span class="divider-line"></span>
      </div>

      <!-- Google Button -->
      <button class="google-btn" id="google-login-btn">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <!-- Status -->
      <div class="status-message" id="status-message"></div>

      <p class="auth-footer">
        By continuing, you agree to our<br>
        <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
      </p>
    </div>

    <!-- Back -->
    <div style="text-align: center;">
      <a href="/index.html" class="back-link">← Back to Knowledge Square</a>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/auth-test/index.js"></script>
</body>
</html>
